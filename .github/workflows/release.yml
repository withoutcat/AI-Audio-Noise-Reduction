# release.yml
# Build and release the AI Noise Reduction installer.
# Runs on windows-latest (needed for WPF app + Inno Setup).
#
# Triggers:
#   - Push to master          (build + upload artifact, no release)
#   - Push tag v*.*.*         (build + publish release with auto-generated notes)
#   - workflow_dispatch       (manual build, upload artifact only)

name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.0.1)"
        required: true
        type: string

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release
  RID: win-x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ---------------------------------------------------------------
      # Determine version: from tag, from manual input, or from branch
      # ---------------------------------------------------------------
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-ci.${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ---------------------------------------------------------------
      # Step 1: Build Bridge C++ DLL
      # ---------------------------------------------------------------
      - name: Build Bridge DLL
        run: |
          echo "Building Bridge C++ DLL..."
          cd src\NoiseReduction.Bridge
          call build.bat
        shell: cmd

      # ---------------------------------------------------------------
      # Step 2: Publish App
      # ---------------------------------------------------------------
      - name: Publish App
        run: |
          dotnet publish src\NoiseReduction.App\NoiseReduction.App.csproj `
            -c ${{ env.CONFIGURATION }} `
            -r ${{ env.RID }} `
            --self-contained false `
            --nologo

      - name: Verify App publish output
        run: |
          $dir = "src\NoiseReduction.App\bin\${{ env.CONFIGURATION }}\net10.0-windows\${{ env.RID }}\publish"
          if (-not (Test-Path $dir)) { throw "App publish directory not found: $dir" }
          $count = (Get-ChildItem $dir -File).Count
          echo "App published: $count files"
        shell: pwsh

      # ---------------------------------------------------------------
      # Step 3: Publish InstallerHelper
      # ---------------------------------------------------------------
      - name: Publish InstallerHelper
        run: |
          dotnet publish installer\NoiseReduction.InstallerHelper\NoiseReduction.InstallerHelper.csproj `
            -c ${{ env.CONFIGURATION }} `
            -r ${{ env.RID }} `
            --self-contained false `
            --nologo

      - name: Verify Helper publish output
        run: |
          $dir = "installer\NoiseReduction.InstallerHelper\bin\${{ env.CONFIGURATION }}\net10.0-windows\${{ env.RID }}\publish"
          if (-not (Test-Path $dir)) { throw "Helper publish directory not found: $dir" }
          $count = (Get-ChildItem $dir -File).Count
          echo "Helper published: $count files"
        shell: pwsh

      # ---------------------------------------------------------------
      # Step 4: Compile Inno Setup installer
      # ---------------------------------------------------------------
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: cmd

      - name: Compile installer
        run: |
          cd installer
          ISCC /DAppVersion=${{ steps.version.outputs.version }} /DOutputFileName="AINoiseReduction-${{ steps.version.outputs.version }}-win-x64" setup.iss
        shell: cmd

      - name: Verify installer output
        run: |
          $files = Get-ChildItem "installer\output" -Filter "*.exe"
          if (-not $files) { throw "No installer EXE found in installer\output" }
          foreach ($f in $files) {
            echo "Installer: $($f.Name) ($([math]::Round($f.Length / 1MB, 2)) MB)"
          }
        shell: pwsh

      # ---------------------------------------------------------------
      # Step 5: Upload artifact
      # ---------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AINoiseReduction-${{ steps.version.outputs.version }}-win-x64
          path: installer\output\*.exe
          if-no-files-found: error

      # ---------------------------------------------------------------
      # Step 6: Create GitHub Release (only when triggered by tag)
      # ---------------------------------------------------------------
      - name: Generate release body from template
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_body
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(sed "s/{{VERSION}}/$VERSION/g" .github/RELEASE_TEMPLATE.md)
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$BODY"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_body.outputs.body }}
          generate_release_notes: true
          files: installer\output\*.exe
          prerelease: false
